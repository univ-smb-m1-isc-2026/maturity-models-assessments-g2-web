<div class="overlay" *ngIf="isOpen" (click)="onOverlayClick($event)">
  <div class="popup">

    <div class="popup__header">
      <div class="popup__title">
        <h2>Résultats de la session</h2>
        <span class="popup__subtitle" *ngIf="session">{{ session.name }}</span>
      </div>
      <button class="popup__close" (click)="close()">✕</button>
    </div>

    <div class="popup__meta" *ngIf="!isLoadingResult && !hasResultError">
      <span class="badge">{{ totalParticipants }} participant{{ totalParticipants > 1 ? 's' : '' }}</span>
    </div>

    <div class="popup__body">

      <div class="popup__loading" *ngIf="isLoadingResult">
        <span>Chargement des résultats…</span>
      </div>

      <div class="popup__error" *ngIf="hasResultError">
        <span>Impossible de charger les résultats.</span>
      </div>

      <div class="popup__empty" *ngIf="!isLoadingResult && !hasResultError && !results.length">
        <span>Aucun résultat pour cette session.</span>
      </div>

      <div class="popup__chart-wrapper" *ngIf="!isLoadingResult && !hasResultError && results.length">
        <canvas #radarCanvas></canvas>
      </div>

    </div>

  </div>
</div>
