<div class="register-wrapper">
  <div class="register-card">
    <h2 class="register-title">Inscription</h2>

    <!-- ✅ Badge informatif si l'utilisateur vient d'une invitation -->
    <p class="invite-badge" *ngIf="isInvited">
      🔗 Vous avez été invité en tant que <strong>Team Member</strong>
    </p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">

      <div class="form-group">
        <label>Prénom</label>
        <input type="text" formControlName="firstName" placeholder="Prénom" />
      </div>

      <div class="form-group">
        <label>Nom</label>
        <input type="text" formControlName="lastName" placeholder="Nom" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <!-- ✅ Email en readonly si pré-rempli depuis l'invitation -->
        <input type="email" formControlName="email" placeholder="Email" [readonly]="isInvited" />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" formControlName="password" placeholder="Mot de passe" />
      </div>

      <!-- ✅ Sélection du rôle uniquement si pas invité -->
      <div class="form-group" *ngIf="!isInvited">
        <label>Rôle</label>
        <select formControlName="role">
          <option value="PMO">PMO (Owner de modèle)</option>
          <option value="TEAM_LEAD">Team Lead</option>
          <option value="TEAM_MEMBER">Team Member</option>
        </select>
      </div>

      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="registerForm.invalid || isLoading" class="submit-btn">
        {{ isLoading ? 'Inscription...' : "S'inscrire" }}
      </button>

    </form>

    <p class="login-link">
      Déjà inscrit ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
